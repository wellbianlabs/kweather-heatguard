<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HeatGuard · 실시간 폭염대응</title>
<style>
  :root{
    --safe:#16a34a; --attention:#84cc16; --caution:#facc15; --warning:#f97316; --danger:#dc2626;
    --bg:#0b1220; --panel:#141d2e; --panel2:#1b273c; --line:#26344d; --text:#e8eef7; --muted:#93a1b8;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",Roboto,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--text)}
  header{display:flex;align-items:center;gap:14px;padding:16px 22px;background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.3px}
  header .sub{color:var(--muted);font-size:12px}
  .status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;background:#475569;box-shadow:0 0 0 0 rgba(0,0,0,0)}
  .dot.on{background:#22c55e;animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .wrap{display:grid;grid-template-columns:1fr 320px;gap:18px;padding:18px 22px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;align-content:start}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;position:relative;overflow:hidden}
  .card .bar{position:absolute;left:0;top:0;bottom:0;width:5px}
  .card .name{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .kind{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .feels{font-size:46px;font-weight:800;line-height:1.1;margin:6px 0 2px}
  .feels small{font-size:16px;font-weight:600;color:var(--muted)}
  .level{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;color:#0b1220}
  .meta{display:flex;gap:14px;margin-top:10px;font-size:12px;color:var(--muted)}
  .spark{margin-top:12px;height:42px;width:100%}
  aside{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;height:fit-content;position:sticky;top:18px}
  aside h2{font-size:13px;margin:0 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .alert{border-left:3px solid var(--danger);background:var(--panel2);border-radius:8px;padding:9px 11px;margin-bottom:8px;font-size:12px}
  .alert .top{display:flex;justify-content:space-between;gap:8px;margin-bottom:3px}
  .alert .lv{font-weight:700}
  .alert .t{color:var(--muted);font-size:11px}
  .alert .act{color:#cbd5e1;line-height:1.4}
  .empty{color:var(--muted);font-size:12px;padding:8px 2px}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .legend span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
<header>
  <h1>🔥 HeatGuard</h1>
  <span class="sub">실시간 폭염대응 · 체감온도 위험감지</span>
  <div class="status"><span id="mode"></span><span class="dot" id="dot"></span><span id="conn">연결 중…</span></div>
</header>

<div class="wrap">
  <main>
    <div class="grid" id="grid"></div>
    <div class="legend" id="legend"></div>
  </main>
  <aside>
    <h2>경보 피드</h2>
    <div id="alerts"><div class="empty">아직 경보가 없습니다.</div></div>
  </aside>
</div>

<script>
const LV = {
  safe:{label:"안전",color:"#16a34a"}, attention:{label:"관심",color:"#84cc16"},
  caution:{label:"주의",color:"#facc15"}, warning:{label:"경고",color:"#f97316"}, danger:{label:"위험",color:"#dc2626"},
};
let THRESH = {attention:31,caution:33,warning:35,danger:38};

const grid = document.getElementById("grid");
const alertsEl = document.getElementById("alerts");
const dot = document.getElementById("dot");
const conn = document.getElementById("conn");
const modeEl = document.getElementById("mode");

fetch("/api/thresholds").then(r=>r.json()).then(d=>{ THRESH=d.thresholds; renderLegend(); });
fetch("/api/health").then(r=>r.json()).then(d=>{ modeEl.textContent = d.mode==="mock" ? "MOCK 데모" : "케이웨더 IoT"; });

function renderLegend(){
  const el = document.getElementById("legend");
  el.innerHTML = Object.entries(LV).map(([k,v])=>{
    const th = THRESH[k] ? ` ${THRESH[k]}℃↑` : "";
    return `<span><i style="background:${v.color}"></i>${v.label}${th}</span>`;
  }).join("");
}
renderLegend();

function sparkline(history){
  const pts = history.filter(p=>p.feels_like!=null).slice(-40);
  if(pts.length<2) return "";
  const w=210,h=42,vals=pts.map(p=>p.feels_like);
  const min=Math.min(...vals,30),max=Math.max(...vals,40);
  const x=i=>i/(pts.length-1)*w, y=v=>h-((v-min)/(max-min||1))*h;
  const d=pts.map((p,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(p.feels_like).toFixed(1)}`).join(" ");
  const last=pts[pts.length-1];
  const yLine=v=>y(v).toFixed(1);
  const tl=t=>`<line x1="0" x2="${w}" y1="${yLine(t)}" y2="${yLine(t)}" stroke="#334155" stroke-dasharray="3 3" stroke-width="1"/>`;
  let lines="";
  [["danger",THRESH.danger],["warning",THRESH.warning],["caution",THRESH.caution]].forEach(([k,t])=>{
    if(t>=min&&t<=max) lines+=`<line x1="0" x2="${w}" y1="${yLine(t)}" y2="${yLine(t)}" stroke="${LV[k].color}" stroke-opacity=".5" stroke-dasharray="2 3" stroke-width="1"/>`;
  });
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${lines}
    <path d="${d}" fill="none" stroke="${LV[last.level].color}" stroke-width="2"/></svg>`;
}

function card(st){
  const lt = st.latest || {};
  const lv = LV[lt.level||"safe"];
  return `<div class="card">
    <div class="bar" style="background:${lv.color}"></div>
    <div class="name">${st.name} <span class="kind">${st.kind==="indoor"?"실내":"옥외"}</span></div>
    <div class="feels" style="color:${lv.color}">${lt.feels_like??"–"}<small> ℃ 체감</small></div>
    <span class="level" style="background:${lv.color}">${lv.label}</span>
    <div class="meta"><span>🌡 ${lt.temperature??"–"}℃</span><span>💧 ${lt.humidity??"–"}%</span></div>
    ${sparkline(st.history||[])}
  </div>`;
}

function render(snap){
  const sts=(snap.stations||[]).sort((a,b)=>(b.latest?.feels_like||0)-(a.latest?.feels_like||0));
  grid.innerHTML = sts.length ? sts.map(card).join("") : `<div class="empty">측정값 수신 대기 중…</div>`;
  if(snap.alerts) renderAlerts(snap.alerts);
}

function renderAlerts(list){
  if(!list.length){ alertsEl.innerHTML=`<div class="empty">아직 경보가 없습니다.</div>`; return; }
  alertsEl.innerHTML = list.slice(0,30).map(a=>{
    const lv=LV[a.level]; const t=new Date(a.at).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    return `<div class="alert" style="border-color:${lv.color}">
      <div class="top"><span class="lv" style="color:${lv.color}">[${a.level_label}] ${a.name}</span><span class="t">${t}</span></div>
      <div class="act">체감 ${a.feels_like}℃ · ${a.action}</div></div>`;
  }).join("");
}

function connect(){
  const proto = location.protocol==="https:"?"wss":"ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws/live`);
  ws.onopen=()=>{ dot.classList.add("on"); conn.textContent="실시간 연결됨"; };
  ws.onmessage=e=>{ const m=JSON.parse(e.data); if(m.type==="snapshot") render(m.data); else if(m.type==="alert") flashAlert(); };
  ws.onclose=()=>{ dot.classList.remove("on"); conn.textContent="재연결 중…"; setTimeout(connect,2000); };
  ws.onerror=()=>ws.close();
  // keepalive
  setInterval(()=>{ if(ws.readyState===1) ws.send("ping"); },25000);
}
function flashAlert(){ document.title="🚨 폭염경보! · HeatGuard"; setTimeout(()=>document.title="HeatGuard · 실시간 폭염대응",4000); }
connect();
</script>
</body>
</html>
