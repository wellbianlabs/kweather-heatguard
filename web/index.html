<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HeatGuard · 실시간 폭염대응</title>
<link rel="icon" href="/assets/favicon.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    /* STS 브랜드 토큰 계승(theme.ts) */
    --kw:#0f499e; --kw-50:#eef4fb; --kw-100:#dbe7f7; --sky:#1790cd;
    --bg:#f7f8fa; --paper:#ffffff; --text:#1e293b; --muted:#64748b;
    --line:#dee2e6; --line-soft:#e9ecef; --gray-0:#f8f9fa;
    /* 폭염 위험단계(사이드바 범례 일치) */
    --safe:#16a34a; --attention:#84cc16; --caution:#eab308; --warning:#f97316; --danger:#dc2626;
    --r-md:12px; --r-lg:16px;
    --shadow-card:0 1px 2px rgba(15,23,42,.04), 0 4px 16px rgba(15,23,42,.04);
    --shadow-lift:0 2px 4px rgba(15,23,42,.05), 0 12px 32px rgba(15,23,42,.08);
    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--font);background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:-0.01em}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:8px;border:3px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#cbd5e1}

  .shell{display:flex;min-height:100vh}

  /* ── 사이드바(NavbarNested 계승) ── */
  .navbar{width:280px;flex:0 0 280px;background:var(--paper);border-right:1px solid var(--line);
    padding:16px;display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto}
  .nav-header{padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid var(--line)}
  .nav-header img{height:22px;display:block}
  .brandTitle{margin-top:9px;font-size:13.5px;font-weight:800;line-height:1.3;letter-spacing:-.2px;color:#1e293b}
  .brandSub{margin-top:2px;font-size:11.5px;font-weight:600;color:var(--muted)}

  .deviceBox{display:flex;flex-direction:column;align-items:center;margin-bottom:16px;padding:10px 12px;
    border-radius:14px;border:1px solid var(--line-soft);background:var(--gray-0)}
  .deviceImg{width:100%;max-width:124px;aspect-ratio:1.08/1;background:url('/assets/sts-device.jpg') no-repeat center 47%;
    background-size:200%;border-radius:8px}
  .deviceCaption{margin-top:6px;font-size:11.5px;font-weight:700;color:#475569}

  .navMain{flex:1 1 auto;min-height:60px}
  .sectionLabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;
    padding:0 8px;margin-bottom:6px}
  .stationItem{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r-md);cursor:default;margin-bottom:4px}
  .stationItem:hover{background:var(--kw-50)}
  .stationItem .sdot{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
  .stationItem .sname{font-size:14px;font-weight:600;line-height:1.25}
  .stationItem .sdesc{font-size:11.5px;color:var(--muted);margin-top:2px}
  .stationItem .sval{margin-left:auto;font-size:13px;font-weight:700;text-align:right}
  .stationItem .sval small{font-weight:600;color:var(--muted);font-size:10.5px}

  .infoCard{margin-top:16px;padding:14px 14px 12px;border-radius:14px;border:1px solid var(--line-soft);background:var(--gray-0)}
  .legendTitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:7px}
  .legendRow{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-bottom:5px}
  .legendDot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
  .legendName{font-weight:700;color:#334155;min-width:30px}
  .legendVal{margin-left:auto;font-size:12px;color:var(--muted)}
  .infoTip{margin-top:9px;font-size:11.5px;line-height:1.45;color:var(--muted)}

  .nav-footer{padding-top:16px;margin-top:16px;border-top:1px solid var(--line)}
  .acct{display:flex;align-items:center;gap:10px;padding:8px 6px}
  .acct .avatar{width:34px;height:34px;border-radius:9px;background:var(--kw);color:#fff;display:flex;align-items:center;
    justify-content:center;font-weight:800;font-size:14px;flex:0 0 auto}
  .acct .who{font-size:13px;font-weight:700;line-height:1.2}
  .acct .who small{display:block;font-weight:500;color:var(--muted);font-size:11px;margin-top:2px}

  /* ── 메인 ── */
  .main{flex:1 1 auto;padding:22px;min-width:0}
  .container{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
  .paper{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-card)}

  .contextBar{padding:16px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .contextBar h1{font-size:18px;font-weight:800;margin:0;letter-spacing:-.3px}
  .contextBar .csub{font-size:12.5px;color:var(--muted)}
  .badge{font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:999px;background:var(--kw-50);color:var(--kw);border:1px solid var(--kw-100)}
  .status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;background:#cbd5e1}
  .dot.on{background:#22c55e;animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}

  .layout{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;align-content:start}

  .card{position:relative;overflow:hidden;padding:16px 16px 14px}
  .card .bar{position:absolute;left:0;top:0;bottom:0;width:5px}
  .card .cname{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px;font-weight:600}
  .kind{font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);font-weight:600}
  .feels{font-size:44px;font-weight:800;line-height:1.1;margin:8px 0 4px;letter-spacing:-1px}
  .feels small{font-size:15px;font-weight:600;color:var(--muted);letter-spacing:0}
  .level{display:inline-block;font-size:12px;font-weight:700;padding:3px 11px;border-radius:999px;color:#fff}
  .meta{display:flex;gap:14px;margin-top:11px;font-size:12.5px;color:var(--muted)}
  .spark{margin-top:12px;height:44px;width:100%}

  aside.alerts{padding:16px;height:fit-content;position:sticky;top:22px}
  aside.alerts h2{font-size:12px;margin:0 0 11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:800}
  .alert{border-left:3px solid var(--danger);background:var(--gray-0);border-radius:9px;padding:10px 12px;margin-bottom:9px}
  .alert .top{display:flex;justify-content:space-between;gap:8px;margin-bottom:4px}
  .alert .lv{font-weight:800;font-size:12.5px}
  .alert .t{color:var(--muted);font-size:11px;white-space:nowrap}
  .alert .act{color:#475569;line-height:1.45;font-size:11.5px}
  .empty{color:var(--muted);font-size:12.5px;padding:10px 2px}

  @media (max-width:1000px){ .layout{grid-template-columns:1fr} aside.alerts{position:static} }
  @media (max-width:760px){
    .navbar{display:none}
    .main{padding:14px}
  }
</style>
</head>
<body>
<div class="shell">
  <!-- ── 사이드바 (STS NavbarNested 디자인) ── -->
  <aside class="navbar">
    <div class="nav-header">
      <img src="/assets/kweather-logo.png" alt="KWEATHER" />
      <div class="brandTitle">실시간 폭염대응 솔루션</div>
      <div class="brandSub">IoT 체감온도 · 실시간 위험감지</div>
    </div>

    <div class="deviceBox">
      <div class="deviceImg" role="img" aria-label="케이웨더 체감온도계 STS 장비"></div>
      <div class="deviceCaption">케이웨더 IoT 센서 · 실시간</div>
    </div>

    <div class="navMain">
      <div class="sectionLabel">측정기</div>
      <div id="stationList"><div class="empty" style="padding:8px">측정기 연결 대기 중…</div></div>
    </div>

    <div class="infoCard">
      <div class="legendTitle">폭염 위험단계 (체감온도)</div>
      <div id="legend"></div>
      <div class="infoTip">체감 33℃↑ 작업 시 2시간마다 20분 휴식은 법적 의무입니다.</div>
    </div>

    <div class="nav-footer">
      <div class="acct">
        <div class="avatar">HG</div>
        <div class="who">HeatGuard<small>실시간 데모</small></div>
      </div>
    </div>
  </aside>

  <!-- ── 메인 ── -->
  <main class="main">
    <div class="container">
      <div class="paper contextBar">
        <div>
          <h1>실시간 현황</h1>
          <div class="csub">사업장·기기별 체감온도 실시간 모니터링 및 폭염 위험감지</div>
        </div>
        <span class="badge" id="modeBadge">실시간</span>
        <div class="status"><span class="dot" id="dot"></span><span id="conn">연결 중…</span></div>
      </div>

      <div class="layout">
        <main>
          <div class="grid" id="grid"></div>
        </main>
        <aside class="alerts paper">
          <h2>경보 피드</h2>
          <div id="alerts"><div class="empty">아직 경보가 없습니다.</div></div>
        </aside>
      </div>
    </div>
  </main>
</div>

<script>
const LV = {
  safe:{label:"안전",color:"#16a34a"}, attention:{label:"관심",color:"#84cc16"},
  caution:{label:"주의",color:"#eab308"}, warning:{label:"경고",color:"#f97316"}, danger:{label:"위험",color:"#dc2626"},
};
let THRESH = {attention:31,caution:33,warning:35,danger:38};

const grid = document.getElementById("grid");
const alertsEl = document.getElementById("alerts");
const stationListEl = document.getElementById("stationList");
const dot = document.getElementById("dot");
const conn = document.getElementById("conn");
const modeBadge = document.getElementById("modeBadge");

fetch("/api/thresholds").then(r=>r.json()).then(d=>{ THRESH=d.thresholds; renderLegend(); }).catch(()=>{});
fetch("/api/health").then(r=>r.json()).then(d=>{ modeBadge.textContent = d.mode==="mock" ? "실시간 데모" : "케이웨더 IoT"; }).catch(()=>{});

function renderLegend(){
  document.getElementById("legend").innerHTML = ["attention","caution","warning","danger"].map(k=>{
    const v=LV[k]; return `<div class="legendRow"><span class="legendDot" style="background:${v.color}"></span>`+
      `<span class="legendName">${v.label}</span><span class="legendVal">${THRESH[k]}℃ 이상</span></div>`;
  }).join("");
}
renderLegend();

function sparkline(history){
  const pts = history.filter(p=>p.feels_like!=null).slice(-40);
  if(pts.length<2) return "";
  const w=210,h=44,vals=pts.map(p=>p.feels_like);
  const min=Math.min(...vals,30),max=Math.max(...vals,40);
  const x=i=>i/(pts.length-1)*w, y=v=>h-((v-min)/(max-min||1))*h;
  const d=pts.map((p,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(p.feels_like).toFixed(1)}`).join(" ");
  const last=pts[pts.length-1], yl=v=>y(v).toFixed(1);
  let lines="";
  [["danger",THRESH.danger],["warning",THRESH.warning],["caution",THRESH.caution]].forEach(([k,t])=>{
    if(t>=min&&t<=max) lines+=`<line x1="0" x2="${w}" y1="${yl(t)}" y2="${yl(t)}" stroke="${LV[k].color}" stroke-opacity=".45" stroke-dasharray="2 3" stroke-width="1"/>`;
  });
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${lines}
    <path d="${d}" fill="none" stroke="${LV[last.level].color}" stroke-width="2"/></svg>`;
}

function card(st){
  const lt = st.latest || {}, lv = LV[lt.level||"safe"];
  return `<div class="paper card">
    <div class="bar" style="background:${lv.color}"></div>
    <div class="cname">${st.name} <span class="kind">${st.kind==="indoor"?"실내":"옥외"}</span></div>
    <div class="feels" style="color:${lv.color}">${lt.feels_like??"–"}<small> ℃ 체감</small></div>
    <span class="level" style="background:${lv.color}">${lv.label}</span>
    <div class="meta"><span>🌡 ${lt.temperature??"–"}℃</span><span>💧 ${lt.humidity??"–"}%</span></div>
    ${sparkline(st.history||[])}
  </div>`;
}

function renderSidebar(sts){
  stationListEl.innerHTML = sts.length ? sts.map(st=>{
    const lt=st.latest||{}, lv=LV[lt.level||"safe"];
    return `<div class="stationItem">
      <span class="sdot" style="background:${lv.color}"></span>
      <div><div class="sname">${st.name}</div><div class="sdesc">${st.kind==="indoor"?"실내":"옥외"} · ${st.sn}</div></div>
      <div class="sval" style="color:${lv.color}">${lt.feels_like??"–"}<small> ℃</small></div>
    </div>`;
  }).join("") : `<div class="empty" style="padding:8px">측정기 연결 대기 중…</div>`;
}

function render(snap){
  const sts=(snap.stations||[]).sort((a,b)=>(b.latest?.feels_like||0)-(a.latest?.feels_like||0));
  grid.innerHTML = sts.length ? sts.map(card).join("") : `<div class="empty">측정값 수신 대기 중…</div>`;
  renderSidebar(sts);
  if(snap.alerts) renderAlerts(snap.alerts);
}

function renderAlerts(list){
  if(!list.length){ alertsEl.innerHTML=`<div class="empty">아직 경보가 없습니다.</div>`; return; }
  alertsEl.innerHTML = list.slice(0,30).map(a=>{
    const lv=LV[a.level], t=new Date(a.at).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    return `<div class="alert" style="border-color:${lv.color}">
      <div class="top"><span class="lv" style="color:${lv.color}">[${a.level_label}] ${a.name}</span><span class="t">${t}</span></div>
      <div class="act">체감 ${a.feels_like}℃ · ${a.action}</div></div>`;
  }).join("");
}

let pollTimer=null, prevAlertKey="";
function startPolling(){
  if(pollTimer) return;
  dot.classList.add("on"); conn.textContent="실시간(폴링)";
  const tick=async()=>{
    try{
      const snap=await (await fetch("/api/live",{cache:"no-store"})).json();
      render(snap);
      const top=(snap.alerts||[])[0], key=top?`${top.sn}:${top.level}`:"";
      if(key && key!==prevAlertKey) flashAlert();
      prevAlertKey=key;
    }catch(e){ dot.classList.remove("on"); conn.textContent="연결 끊김"; }
  };
  tick(); pollTimer=setInterval(tick,3000);
}

function connect(){
  // WebSocket(sts 서버) 우선, 실패 시 폴링(Vercel 서버리스)로 자동 전환.
  let settled=false;
  const proto = location.protocol==="https:"?"wss":"ws";
  let ws;
  try{ ws = new WebSocket(`${proto}://${location.host}/ws/live`); }
  catch(e){ return startPolling(); }
  const fallback=setTimeout(()=>{ if(!settled){ try{ws.close();}catch(_){}{} startPolling(); } },2500);
  ws.onopen=()=>{ settled=true; clearTimeout(fallback); dot.classList.add("on"); conn.textContent="실시간 연결됨"; };
  ws.onmessage=e=>{ const m=JSON.parse(e.data); if(m.type==="snapshot") render(m.data); else if(m.type==="alert") flashAlert(); };
  ws.onclose=()=>{ clearTimeout(fallback); if(!settled){ startPolling(); return; } dot.classList.remove("on"); conn.textContent="재연결 중…"; setTimeout(connect,2000); };
  ws.onerror=()=>{ if(!settled){ clearTimeout(fallback); startPolling(); } try{ws.close();}catch(_){}{} };
  setInterval(()=>{ if(ws && ws.readyState===1) ws.send("ping"); },25000);
}
function flashAlert(){ document.title="🚨 폭염경보! · HeatGuard"; setTimeout(()=>document.title="HeatGuard · 실시간 폭염대응",4000); }
connect();
</script>
</body>
</html>
